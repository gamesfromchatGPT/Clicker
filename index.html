<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCrypt: Infinite Edition (Online)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Весь твой крутой CSS остается здесь (я его сохранил) */
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #151515;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--panel-bg);
            padding: 30px;
            border: 2px solid var(--neon-green);
            text-align: center;
            box-shadow: 0 0 20px var(--neon-green);
        }

        input {
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            margin-top: 10px;
            font-family: 'Fira Code';
        }

        button {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Остальные стили кликера... */
        .container { width: 90%; max-width: 800px; text-align: center; margin-top: 20px; }
        .stats { font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .click-area { font-size: 80px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .click-area:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>СИСТЕМА ИДЕНТИФИКАЦИИ</h2>
            <p>Введите ваш хакерский позывной:</p>
            <input type="text" id="username-input" placeholder="Nickname...">
            <br>
            <button onclick="startApp()">ВХОД В СИСТЕМУ</button>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            ID: <span id="display-name">---</span> | 
            Баланс: <span id="balance">0</span> ₿ | 
            Ранг: <span id="rank">Новичок</span>
        </div>
        <div class="click-area" onclick="handleButtonClick()">🏙️</div>
        </div>

    <script type="module">
        // --- ПОДКЛЮЧЕНИЕ FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fq8uvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.firebasestorage.app",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154",
            measurementId: "G-LJ9XKE9SGF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Переменные игры
        let gameState = {
            money: 0,
            rank: "Мамин Хакер",
            clicks: 0,
            cheater: false
        };
        let currentUserId = "";

        // Функция входа
        window.startApp = function() {
            const name = document.getElementById('username-input').value;
            if(!name) return alert("Введите имя!");
            
            currentUserId = name;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('display-name').innerText = name;

            // Загружаем данные из облака
            const userRef = ref(db, 'users/' + currentUserId);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    gameState = data;
                    updateUI();
                } else {
                    saveToCloud(); // Создаем нового игрока
                }
            });
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(gameState.money);
            document.getElementById('rank').innerText = gameState.rank;
        }

        window.handleButtonClick = function() {
            gameState.money += 1;
            gameState.clicks += 1;
            updateUI();
            saveToCloud(); // Сохраняем при каждом клике (или раз в 10 кликов для скорости)
        }

        function saveToCloud() {
            if(currentUserId) {
                set(ref(db, 'users/' + currentUserId), gameState);
            }
        }
    </script>
</body>
</html>
