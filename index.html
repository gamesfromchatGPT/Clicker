<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCrypt: Online Empire</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 10, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 70px;
            background: black;
            border-right: 2px solid var(--neon-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 30px;
            z-index: 10;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            cursor: pointer;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .nav-icon:hover, .nav-icon.active {
            filter: grayscale(0) drop-shadow(0 0 5px var(--neon-cyan));
        }

        /* Главный экран */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stats-bar {
            position: absolute;
            top: 20px;
            width: 80%;
            padding: 15px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .click-area {
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .click-area:active {
            transform: scale(0.95);
        }

        .main-icon {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-magenta);
        }

        .logs-panel {
            margin-top: 40px;
            width: 300px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .btn-wipe {
            margin-top: 15px;
            background: transparent;
            border: 1px solid #f00;
            color: #f00;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.7em;
        }

        /* Окно входа */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .auth-card {
            background: #111;
            padding: 40px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            border-radius: 20px;
        }

        input {
            background: #000;
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 10px;
            margin: 20px 0;
            width: 200px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>SYSTEM ACCESS</h2>
            <input type="text" id="username-input" placeholder="ENTER ID...">
            <br>
            <button onclick="login()" style="background: var(--neon-cyan); border: none; padding: 10px 20px; cursor: pointer;">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <div class="sidebar">
        <img src="https://cdn-icons-png.flaticon.com/512/606/606161.png" class="nav-icon" title="Город">
        <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" class="nav-icon" title="Магазин">
        <img src="https://cdn-icons-png.flaticon.com/512/3588/3588204.png" class="nav-icon" title="Кастомизация">
        <img src="https://cdn-icons-png.flaticon.com/512/2920/2920618.png" class="nav-icon active" title="Статистика">
    </div>

    <div class="main-content">
        <div class="stats-bar">
            <div><img src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" width="20" style="vertical-align: middle;"> <span id="balance-display">0</span> ₿</div>
            <div style="font-size: 0.8em; color: #888;">ID: <span id="player-id">---</span></div>
        </div>

        <div class="click-area" onclick="handleMainClick()">
            <img src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" class="main-icon" id="main-target">
        </div>

        <div class="logs-panel">
            <h3 style="font-size: 0.9em; margin-bottom: 15px;">SYSTEM LOGS</h3>
            <div style="display: flex; justify-content: space-between; font-family: 'Roboto Mono'; font-size: 0.8em;">
                <span>CLICKS</span>
                <span id="clicks-session">0</span>
            </div>
            <button class="btn-wipe" onclick="wipeData()">WIPE ALL DATA</button>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fQbuvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.appspot.com",
            databaseURL: "https://cybercrypt-online-de357-default-rtdb.firebaseio.com",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154",
            measurementId: "G-LJ9XKE9SGF"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = "";
        let balance = 0;
        let sessionClicks = 0;

        // Функция входа
        function login() {
            const input = document.getElementById('username-input').value.trim();
            if (input.length < 2) return alert("ID слишком короткий!");
            
            currentUser = input;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('player-id').innerText = currentUser;

            // Загрузка данных из Firebase
            const userRef = database.ref('users/' + currentUser);
            userRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    balance = data.balance || 0;
                    updateUI();
                } else {
                    // Если игрока нет — создаем его
                    saveData();
                }
            });
        }

        function handleMainClick() {
            if (!currentUser) return;
            balance += 1;
            sessionClicks += 1;
            updateUI();
            saveData();
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = balance;
            document.getElementById('clicks-session').innerText = sessionClicks;
        }

        function saveData() {
            if (!currentUser) return;
            database.ref('users/' + currentUser).set({
                balance: balance,
                lastUpdate: Date.now()
            });
        }

        function wipeData() {
            if (confirm("УНИЧТОЖИТЬ ВСЕ ДАННЫЕ?")) {
                balance = 0;
                sessionClicks = 0;
                saveData();
                updateUI();
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
