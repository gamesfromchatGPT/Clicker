<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Empire: God Mode</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bb86fc; --bg: #121212; --text: #e0e0e0; --panel: #1e1e1e; }
        .theme-main { --accent: #ffb7c5; --bg: #fff5f7; --text: #5d4037; --panel: #ffffff; }
        .theme-coffee { --accent: #a67c52; --bg: #fdf5e6; --text: #4b3621; --panel: #fffaf0; }

        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Comfortaa', cursive; display: flex; flex-direction: column; height: 100vh; transition: 0.5s; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--panel); border-bottom: 3px solid var(--accent); }
        .container { display: flex; flex-grow: 1; overflow: hidden; }
        
        .shop-sidebar { width: 300px; background: var(--panel); border-right: 2px solid var(--accent); padding: 20px; overflow-y: auto; }
        .shop-item { background: var(--bg); border: 1px solid var(--accent); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
        
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-target { width: 250px; height: 250px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .main-target:active { transform: scale(0.9); }

        /* ЧИТ-МЕНЮ: Новое оформление */
        #cheat-menu { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel); padding: 25px; border-radius: 30px; 
            border: 4px solid #ff4d4d; z-index: 3000; width: 450px; text-align: center;
            box-shadow: 0 0 100px rgba(255, 77, 77, 0.4);
        }
        .cheat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .log-box { width: 90%; height: 60px; background: rgba(0,0,0,0.05); margin-top: 10px; border-radius: 10px; font-size: 0.7em; overflow-y: auto; padding: 5px; text-align: left; }
        .btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.8em; }
        .btn-danger { background: #ff4d4d; }
        
        #auth { position: fixed; inset: 0; background: #121212; display: flex; justify-content: center; align-items: center; z-index: 4000; color: white; }
    </style>
</head>
<body class="theme-dark">
    <div id="auth">
        <div style="background: #1e1e1e; padding: 50px; border-radius: 40px; border: 3px solid #bb86fc; text-align: center;">
            <h2 style="color: #bb86fc">Вход в IT-Котов</h2>
            <input type="text" id="nick" placeholder="Ник владельца..." style="padding: 12px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; width: 200px;"><br>
            <button class="btn" style="background: #bb86fc" onclick="login()">ВОЙТИ</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="stats">☕️ <span id="disp-bal">0</span> | <span id="disp-rank">Котёнок</span></div>
        <div style="cursor: pointer; font-size: 0.8em; color: #ff4d4d;" onclick="openCheat()">⚙️ HACK CONSOLE: <span id="disp-id">---</span></div>
    </div>

    <div class="container">
        <div class="shop-sidebar">
            <h3 style="text-align:center;">🐾 Кот-Маркет</h3>
            <div id="shop-list"></div> </div>

        <div class="game-area">
            <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" class="main-target" id="coffee-img" onclick="doClick()">
            <p>Сила клика: <span id="disp-click">1</span> | Помощники: <span id="disp-helpers">0</span></p>
            <div class="log-box" id="logs">> Система готова.</div>
        </div>
    </div>

    <div id="cheat-menu">
        <h2 style="color: #ff4d4d; margin: 0;">☢️ OVERLORD TERMINAL ☢️</h2>
        <div class="cheat-grid">
            <button class="btn" onclick="addMoney(1000000)">+1M Денег</button>
            <button class="btn" onclick="addMoney(-balance)">Обнулить счёт</button>
            <button class="btn" onclick="multiplySpeed(2)">X2 Скорость</button>
            <button class="btn" onclick="multiplySpeed(0.5)">/2 Скорость</button>
            <button class="btn" onclick="changeClickForce(1000)">Клик = 1000</button>
            <button class="btn" onclick="setRank('АДМИН')">Ранг: АДМИН</button>
            <button class="btn" onclick="spawnVisualChaos()">Визуальный хаос</button>
            <button class="btn" onclick="stopGame()">Заморозить игру</button>
        </div>
        <hr style="border: 1px solid #444; margin: 15px 0;">
        <button class="btn btn-danger" style="width: 100%;" onclick="deleteAccount()">💥 УДАЛИТЬ АККАУНТ ИЗ БД</button>
        <br><br>
        <button class="btn" style="background:#555; width: 100%;" onclick="closeCheat()">ВЕРНУТЬСЯ В ИГРУ</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fQbuvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.appspot.com",
            databaseURL: "https://cybercrypt-online-de357-default-rtdb.firebaseio.com",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = ""; 
        let balance = 0; 
        let helpers = 0; 
        let clickForce = 1;
        let forcedRank = "";
        let isFrozen = false;

        // Генерация магазина
        const items = [
            {n: "Коробка", p: 1, c: 20}, {n: "Валерьянка", p: 5, c: 150},
            {n: "Лазер", p: 15, c: 500}, {n: "Дрон", p: 200, c: 10000}
        ];
        items.forEach(i => {
            document.getElementById('shop-list').innerHTML += `
                <div class="shop-item"><span>${i.n} (+${i.p}/с)</span><button class="btn" onclick="buy(${i.p}, ${i.c})">${i.c}</button></div>
            `;
        });

        function login() {
            user = document.getElementById('nick').value.trim();
            if(user.length < 2) return;
            localStorage.setItem('lastUser', user);
            document.getElementById('auth').style.display = 'none';
            document.getElementById('disp-id').innerText = user;

            db.ref('users/' + user).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    balance = data.balance || 0;
                    helpers = data.helpers || 0;
                    clickForce = data.clickForce || 1;
                    forcedRank = data.rank || "";
                    updateUI();
                } else { saveData(); }
            });
        }

        window.onload = () => {
            let saved = localStorage.getItem('lastUser');
            if(saved) { document.getElementById('nick').value = saved; login(); }
        }

        function doClick() { 
            if(isFrozen) return;
            balance += clickForce; 
            updateUI(); 
            addLog(`Клик: +${clickForce}`);
        }
        
        function buy(p, cost) {
            if(balance >= cost) { balance -= cost; helpers += p; updateUI(); saveData(); }
        }

        function updateUI() {
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-helpers').innerText = helpers;
            document.getElementById('disp-click').innerText = clickForce;
            document.getElementById('disp-rank').innerText = forcedRank || (balance > 10000 ? "Бог Кофе" : "Котёнок");
        }

        function saveData() {
            if(user && !isFrozen) db.ref('users/' + user).set({ balance, helpers, clickForce, rank: document.getElementById('disp-rank').innerText });
        }

        // ЧИТЫ
        function addMoney(a) { balance += a; updateUI(); saveData(); addLog("Hack: Изменение баланса"); }
        function setRank(r) { forcedRank = r; updateUI(); saveData(); }
        function changeClickForce(v) { clickForce = v; updateUI(); saveData(); addLog("Hack: Сила клика изменена"); }
        function multiplySpeed(m) { helpers *= m; updateUI(); saveData(); addLog("Hack: Скорость изменена"); }
        
        function stopGame() { 
            isFrozen = !isFrozen; 
            addLog(isFrozen ? "ИГРА ЗАМОРОЖЕНА" : "ИГРА РАЗМОРОЖЕНА");
            document.body.style.filter = isFrozen ? "grayscale(1)" : "none";
        }

        function spawnVisualChaos() {
            document.body.style.transition = "0.1s";
            document.body.style.transform = `rotate(${Math.random()*10 - 5}deg) scale(1.1)`;
            setTimeout(() => { document.body.style.transform = "none"; }, 500);
        }

        function deleteAccount() {
            if(confirm("УДАЛИТЬ ВСЁ? Это сотрет данные из Firebase навсегда!")) {
                db.ref('users/' + user).remove().then(() => {
                    localStorage.removeItem('lastUser');
                    location.reload();
                });
            }
        }

        setInterval(() => { if(helpers > 0 && !isFrozen) { balance += (helpers/10); updateUI(); } }, 100);
        setInterval(() => { saveData(); }, 5000); // Сохранение раз в 5 сек

        function addLog(m) { const l = document.getElementById('logs'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }
        function openCheat() { document.getElementById('cheat-menu').style.display = 'block'; }
        function closeCheat() { document.getElementById('cheat-menu').style.display = 'none'; }
    </script>
</body>
</html>
