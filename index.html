<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Empire: Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffb7c5; --bg: #fff5f7; --text: #5d4037; --panel: #ffffff;
            --cat-url: url('https://cdn-icons-png.flaticon.com/512/616/616430.png');
        }
        /* Темная тема для старта */
        .theme-dark {
            --accent: #bb86fc; --bg: #121212; --text: #e0e0e0; --panel: #1e1e1e;
        }
        .theme-coffee {
            --accent: #a67c52; --bg: #fdf5e6; --text: #4b3621; --panel: #fffaf0;
        }

        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Comfortaa', cursive; display: flex; flex-direction: column; 
            height: 100vh; transition: 0.5s; overflow: hidden;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: var(--panel); border-bottom: 3px solid var(--accent);
        }

        .container { display: flex; flex-grow: 1; overflow: hidden; }

        /* Магазин на главном экране (Слева) */
        .shop-sidebar {
            width: 300px; background: var(--panel); border-right: 2px solid var(--accent);
            padding: 20px; overflow-y: auto;
        }

        .shop-item {
            background: var(--bg); border: 1px solid var(--accent);
            border-radius: 15px; padding: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85em; transition: 0.3s;
        }
        .shop-item:hover { transform: translateX(5px); }

        /* Игровая зона */
        .game-area {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .main-cat {
            width: 250px; height: 250px; cursor: pointer; transition: 0.1s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }
        .main-cat:active { transform: scale(0.9); }

        /* Выбор темы на главном (Справа) */
        .theme-sidebar {
            width: 150px; background: var(--panel); border-left: 2px solid var(--accent);
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        .theme-btn {
            padding: 10px; border-radius: 10px; border: 2px solid var(--accent);
            cursor: pointer; text-align: center; font-size: 0.8em; font-weight: bold;
        }

        /* Чит-меню */
        #cheat-menu {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); padding: 30px; border-radius: 30px;
            border: 5px solid #ff4d4d; z-index: 3000; width: 400px; text-align: center;
        }

        .log-box { width: 90%; height: 60px; background: rgba(0,0,0,0.05); margin-top: 10px; border-radius: 10px; font-size: 0.7em; overflow-y: auto; padding: 5px; }
        
        .btn { background: var(--accent); border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: bold; }
        
        #auth { position: fixed; inset: 0; background: #121212; display: flex; justify-content: center; align-items: center; z-index: 4000; color: white; }
    </style>
</head>
<body class="theme-dark"> <div id="auth">
        <div style="background: #1e1e1e; padding: 50px; border-radius: 40px; border: 3px solid #bb86fc; text-align: center;">
            <h2 style="color: #bb86fc">Вход в IT-Котов</h2>
            <input type="text" id="nick" placeholder="Ник владельца..." style="padding: 12px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; width: 200px;"><br>
            <button class="btn" style="background: #bb86fc" onclick="login()">УСТАНОВИТЬ СОЕДИНЕНИЕ</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="stats">🐾 <span id="disp-bal">0</span> | Ранг: <span id="disp-rank">Котёнок</span></div>
        <div style="cursor: pointer; font-size: 0.8em" onclick="openCheat()">💻 ADMIN: <span id="disp-id">---</span></div>
    </div>

    <div class="container">
        <div class="shop-sidebar">
            <h3 style="text-align:center; font-size: 1em;">🐾 Кот-Маркет</h3>
            <div class="shop-item"><span>Коробка (+1/с)</span><button class="btn" onclick="buy(1, 20)">20</button></div>
            <div class="shop-item"><span>Валерьянка (+5/с)</span><button class="btn" onclick="buy(5, 150)">150</button></div>
            <div class="shop-item"><span>Лазер (+15/с)</span><button class="btn" onclick="buy(15, 500)">500</button></div>
            <div class="shop-item"><span>Когтеточка (+50/с)</span><button class="btn" onclick="buy(50, 2000)">2k</button></div>
            <div class="shop-item"><span>Дрон-рыба (+200/с)</span><button class="btn" onclick="buy(200, 10000)">10k</button></div>
        </div>

        <div class="game-area">
            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="main-cat" onclick="doClick()">
            <p>Помощников: <span id="disp-helpers">0</span></p>
            <div class="log-box" id="logs"></div>
        </div>

        <div class="theme-sidebar">
            <h4 style="text-align:center; font-size: 0.8em;">ПАЛИТРА</h4>
            <div class="theme-btn" style="background:#fff5f7; color:#5d4037;" onclick="setTheme('theme-main')">Мило</div>
            <div class="theme-btn" style="background:#121212; color:#e0e0e0;" onclick="setTheme('theme-dark')">Тьма</div>
            <div class="theme-btn" style="background:#fdf5e6; color:#4b3621;" onclick="setTheme('theme-coffee')">Кофе</div>
        </div>
    </div>

    <div id="cheat-menu">
        <h3 style="color: #ff4d4d">🐾 ULTRA CHEAT MENU 🐾</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="addMoney(100000)">+100k🐾</button>
            <button class="btn" onclick="addMoney(-50000)">-50k🐾</button>
            <button class="btn" onclick="setRank('Котик!')">Ранг: Котик!</button>
            <button class="btn" onclick="setRank('БОГ КОТОВ')">Ранг: БОГ</button>
            <button class="btn" onclick="helpers += 1000; updateUI(); saveData();">Армия (1к котов)</button>
            <button class="btn" onclick="balance *= 2; updateUI(); saveData();">X2 Баланс</button>
            <button class="btn" onclick="wipeData()" style="background:red">УДАЛИТЬ ВСЁ</button>
        </div>
        <br>
        <button class="btn" onclick="closeCheat()" style="background:#666">Закрыть терминал</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fQbuvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.appspot.com",
            databaseURL: "https://cybercrypt-online-de357-default-rtdb.firebaseio.com",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = ""; let balance = 0; let helpers = 0; let forcedRank = "";

        function login() {
            user = document.getElementById('nick').value.trim();
            if(user.length < 2) return;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('disp-id').innerText = user;
            
            db.ref('users/' + user).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    balance = data.balance || 0;
                    helpers = data.helpers || 0;
                    forcedRank = data.rank || "";
                    updateUI();
                } else { saveData(); }
            });
        }

        function doClick() { balance++; updateUI(); saveData(); addLog("+1 мяу-очко"); }

        function buy(p, cost) {
            if(balance >= cost) { balance -= cost; helpers += p; updateUI(); saveData(); addLog("Куплено: +" + p + "/сек"); }
            else { alert("Мало лапок (денег)!"); }
        }

        function updateUI() {
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-helpers').innerText = helpers;
            let r = "Котёнок";
            if(balance > 500) r = "Шерстяной";
            if(balance > 5000) r = "Котик!";
            document.getElementById('disp-rank').innerText = forcedRank || r;
        }

        function saveData() {
            if(!user) return;
            db.ref('users/' + user).update({ balance: balance, helpers: helpers, rank: document.getElementById('disp-rank').innerText });
        }

        setInterval(() => { if(helpers > 0) { balance += (helpers/10); updateUI(); } }, 100);

        function addLog(m) {
            const l = document.getElementById('logs');
            l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
        }

        function setTheme(t) {
            document.body.className = t;
            addLog("Тема изменена на " + t);
        }

        function openCheat() { document.getElementById('cheat-menu').style.display = 'block'; }
        function closeCheat() { document.getElementById('cheat-menu').style.display = 'none'; }
        function addMoney(a) { balance += a; updateUI(); saveData(); }
        function setRank(r) { forcedRank = r; updateUI(); saveData(); }
        function wipeData() { if(confirm("Сбросить аккаунт?")) { db.ref('users/' + user).remove(); location.reload(); } }
    </script>
</body>
</html>
