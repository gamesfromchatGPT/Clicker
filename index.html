<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Empire: Persistent Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bb86fc; --bg: #121212; --text: #e0e0e0; --panel: #1e1e1e; }
        .theme-main { --accent: #ffb7c5; --bg: #fff5f7; --text: #5d4037; --panel: #ffffff; }
        .theme-coffee { --accent: #a67c52; --bg: #fdf5e6; --text: #4b3621; --panel: #fffaf0; }

        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Comfortaa', cursive; display: flex; flex-direction: column; height: 100vh; transition: 0.5s; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--panel); border-bottom: 3px solid var(--accent); }
        .container { display: flex; flex-grow: 1; overflow: hidden; }
        .shop-sidebar { width: 300px; background: var(--panel); border-right: 2px solid var(--accent); padding: 20px; overflow-y: auto; }
        .shop-item { background: var(--bg); border: 1px solid var(--accent); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-target { width: 250px; height: 250px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .main-target:active { transform: scale(0.9); }
        .theme-sidebar { width: 150px; background: var(--panel); border-left: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .theme-btn { padding: 10px; border-radius: 10px; border: 2px solid var(--accent); cursor: pointer; text-align: center; font-size: 0.8em; font-weight: bold; }
        #cheat-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); padding: 30px; border-radius: 30px; border: 5px solid #ff4d4d; z-index: 3000; width: 400px; text-align: center; }
        .log-box { width: 90%; height: 60px; background: rgba(0,0,0,0.05); margin-top: 10px; border-radius: 10px; font-size: 0.7em; overflow-y: auto; padding: 5px; }
        .btn { background: var(--accent); border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: bold; }
        #auth { position: fixed; inset: 0; background: #121212; display: flex; justify-content: center; align-items: center; z-index: 4000; color: white; }
    </style>
</head>
<body class="theme-dark">
    <div id="auth">
        <div style="background: #1e1e1e; padding: 50px; border-radius: 40px; border: 3px solid #bb86fc; text-align: center;">
            <h2 style="color: #bb86fc">Вход в IT-Котов</h2>
            <input type="text" id="nick" placeholder="Ник владельца..." style="padding: 12px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; width: 200px;"><br>
            <button class="btn" style="background: #bb86fc" onclick="login()">ВОЙТИ</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="stats">☕️ <span id="disp-bal">0</span> | Ранг: <span id="disp-rank">Котёнок</span></div>
        <div style="cursor: pointer; font-size: 0.8em" onclick="openCheat()">💻 ADMIN: <span id="disp-id">---</span></div>
    </div>

    <div class="container">
        <div class="shop-sidebar">
            <h3 style="text-align:center;">🐾 Кот-Маркет</h3>
            <div class="shop-item"><span>Коробка (+1/с)</span><button class="btn" onclick="buy(1, 20)">20</button></div>
            <div class="shop-item"><span>Валерьянка (+5/с)</span><button class="btn" onclick="buy(5, 150)">150</button></div>
            <div class="shop-item"><span>Лазер (+15/с)</span><button class="btn" onclick="buy(15, 500)">500</button></div>
            <div class="shop-item"><span>Когтеточка (+50/с)</span><button class="btn" onclick="buy(50, 2000)">2k</button></div>
            <div class="shop-item"><span>Дрон-рыба (+200/с)</span><button class="btn" onclick="buy(200, 10000)">10k</button></div>
        </div>

        <div class="game-area">
            <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" class="main-target" onclick="doClick()">
            <p>Помощников-котов: <span id="disp-helpers">0</span></p>
            <div class="log-box" id="logs"></div>
        </div>

        <div class="theme-sidebar">
            <h4 style="text-align:center;">ПАЛИТРА</h4>
            <div class="theme-btn" onclick="setTheme('theme-main')">Мило</div>
            <div class="theme-btn" onclick="setTheme('theme-dark')">Тьма</div>
            <div class="theme-btn" onclick="setTheme('theme-coffee')">Кофе</div>
        </div>
    </div>

    <div id="cheat-menu">
        <h3 style="color: #ff4d4d">🐾 ADMIN PANEL 🐾</h3>
        <button class="btn" onclick="addMoney(100000)">+100k ☕️</button><br><br>
        <button class="btn" onclick="deleteAccount()" style="background: #ff4d4d">УДАЛИТЬ АККАУНТ</button><br><br>
        <button class="btn" onclick="closeCheat()" style="background:#666">Закрыть</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fQbuvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.appspot.com",
            databaseURL: "https://cybercrypt-online-de357-default-rtdb.firebaseio.com",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let user = ""; let balance = 0; let helpers = 0; let forcedRank = "";

        function login() {
            user = document.getElementById('nick').value.trim();
            if(user.length < 2) return;
            localStorage.setItem('lastUser', user); // Запоминаем ник
            document.getElementById('auth').style.display = 'none';
            document.getElementById('disp-id').innerText = user;

            db.ref('users/' + user).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    balance = data.balance || 0;
                    helpers = data.helpers || 0;
                    forcedRank = data.rank || "";
                    updateUI();
                } else { saveData(); }
            });
        }

        // Авто-логин при загрузке страницы
        window.onload = () => {
            let saved = localStorage.getItem('lastUser');
            if(saved) { document.getElementById('nick').value = saved; login(); }
        }

        function doClick() { balance++; updateUI(); saveData(); }
        
        function buy(p, cost) {
            if(balance >= cost) { balance -= cost; helpers += p; updateUI(); saveData(); }
        }

        function updateUI() {
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-helpers').innerText = helpers;
            document.getElementById('disp-rank').innerText = forcedRank || (balance > 5000 ? "Котик!" : "Котёнок");
        }

        function saveData() {
            if(user) db.ref('users/' + user).set({ balance, helpers, rank: document.getElementById('disp-rank').innerText });
        }

        function deleteAccount() {
            if(confirm("Вы уверены, что хотите УДАЛИТЬ аккаунт и все данные?")) {
                db.ref('users/' + user).remove().then(() => {
                    localStorage.removeItem('lastUser'); // Стираем локальную память
                    location.reload();
                });
            }
        }

        setInterval(() => { if(helpers > 0) { balance += (helpers/10); updateUI(); saveData(); } }, 1000); // Сохранение раз в секунду

        function setTheme(t) { document.body.className = t; }
        function openCheat() { document.getElementById('cheat-menu').style.display = 'block'; }
        function closeCheat() { document.getElementById('cheat-menu').style.display = 'none'; }
        function addMoney(a) { balance += a; updateUI(); saveData(); }
    </script>
</body>
</html>
