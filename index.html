<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Cat & Coffee Empire</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Милая тема по умолчанию */
            --accent: #ffb7c5; --bg: #fff5f7; --text: #5d4037; --panel: #ffffff;
            /* Котик на заднем плане остается */
            --bg-cat: url('https://cdn-icons-png.flaticon.com/512/616/616430.png');
        }
        /* Темы */
        .theme-dark {
            --accent: #bb86fc; --bg: #1a1a1a; --text: #e0e0e0; --panel: #2d2d2d;
        }
        .theme-coffee {
            --accent: #a67c52; --bg: #fdf5e6; --text: #4b3621; --panel: #fffaf0;
        }

        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Comfortaa', cursive; display: flex; height: 100vh; transition: 0.5s; 
            overflow: hidden;
            /* Котик на заднем плане */
            background-image: var(--bg-cat); background-size: 120px; background-repeat: no-repeat;
            background-position: bottom right; background-attachment: fixed;
        }

        /* Верхняя панель */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: var(--panel); border-bottom: 3px solid var(--accent); z-index: 10; }
        .stats { background: var(--panel); padding: 8px 20px; border-radius: 25px; border: 2px solid var(--accent); }

        .container { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* Магазин (Кошачий) */
        .shop-sidebar { width: 280px; background: var(--panel); border-right: 2px solid var(--accent); padding: 20px; overflow-y: auto; z-index: 5; }
        .shop-title { text-align: center; color: var(--accent); font-size: 1.1em; margin-bottom: 15px; }
        .shop-item { background: var(--bg); border: 1px solid #eee; border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8em; transition: 0.2s; }
        .shop-item:hover { border-color: var(--accent); transform: translateX(3px); }

        /* Игровая зона */
        .game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* ГЛАВНЫЙ ЭЛЕМЕНТ - КОФЕ */
        .target { width: 220px; height: 220px; cursor: pointer; transition: 0.1s; user-select: none; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .target:active { transform: scale(0.9); }

        /* Панели (Темы и Логи) */
        .side-panels { width: 180px; display: flex; flex-direction: column; gap: 20px; padding: 20px; background: var(--panel); border-left: 2px solid var(--accent); }
        
        .theme-btn { padding: 10px; border-radius: 10px; border: 2px solid var(--accent); cursor: pointer; text-align: center; font-size: 0.8em; font-weight: bold; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.05); }

        .log-box { background: rgba(0,0,0,0.03); border-radius: 10px; padding: 10px; font-size: 0.65em; height: 100px; overflow-y: auto; font-family: 'Courier New', monospace; }

        /* Чит-меню (Кошачье) */
        #cheat-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); padding: 30px; border-radius: 30px; border: 5px solid #ff4d4d; z-index: 3000; width: 350px; text-align: center; box-shadow: 0 0 50px rgba(255,77,77,0.3); }

        .btn { background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; }
        .btn:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        
        #auth { position: fixed; inset: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 4000; color: white; }
    </style>
</head>
<body class="theme-dark"> <div id="auth">
        <div style="background: #1e1e1e; padding: 50px; border-radius: 40px; border: 3px solid #bb86fc; text-align: center;">
            <h2 style="color: #bb86fc">Cat & Coffee Login</h2>
            <input type="text" id="nick" placeholder="Имя владельца..." style="padding: 12px; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; width: 200px;"><br>
            <button class="btn" style="background: #bb86fc" onclick="login()">УСТАНОВИТЬ СОЕДИНЕНИЕ</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="stats">☕️ <span id="disp-bal">0</span> | Ранг: <span id="disp-rank" style="font-weight:bold; color:var(--accent);">Котёнок</span></div>
        <div style="cursor: pointer; opacity: 0.5; font-size:0.8em;" onclick="openCheat()">💻 OWNER: <span id="disp-id">---</span></div>
    </div>

    <div class="container">
        <div class="shop-sidebar">
            <h3 class="shop-title">🐾 Кот-Маркет</h3>
            <div class="shop-item"><span>Кот-соня (+1/с)</span><button class="btn" onclick="buyCat(1, 20)">20</button></div>
            <div class="shop-item"><span>Кот-батон (+5/с)</span><button class="btn" onclick="buyCat(5, 100)">100</button></div>
            <div class="shop-item"><span>Кот-дрон (+25/с)</span><button class="btn" onclick="buyCat(25, 600)">600</button></div>
            <div class="shop-item"><span>Кот-хакер (+100/с)</span><button class="btn" onclick="buyCat(100, 3000)">3k</button></div>
        </div>

        <div class="game-area">
            <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" class="target" id="main-click-img" onclick="doClick()">
            <p style="margin-top:15px; font-size:0.9em;">Котов-помощников: <span id="disp-helpers">0</span></p>
        </div>

        <div class="side-panels">
            <h4 style="text-align:center; margin:0; font-size:0.9em;">ПАЛИТРА</h4>
            <div class="theme-btn" style="background:#fff5f7; color:#5d4037;" onclick="setTheme('theme-main')">Мило</div>
            <div class="theme-btn" style="background:#121212; color:#e0e0e0;" onclick="setTheme('theme-dark')">Тьма</div>
            <div class="theme-btn" style="background:#fdf5e6; color:#4b3621;" onclick="setTheme('theme-coffee')">Кофе</div>
            
            <h4 style="text-align:center; margin:10px 0 0 0; font-size:0.9em;">ЛОГИ</h4>
            <div class="log-box" id="logs">> Ожидаю входа...</div>
        </div>
    </div>

    <div id="cheat-menu">
        <h3 style="color: #ff4d4d">🐾 CAT OWNER MENU 🐾</h3>
        <button class="btn" onclick="addMoney(100000)">+100k☕️</button>
        <button class="btn" onclick="addMoney(-50000)">-50k☕️</button><br>
        <button class="btn" onclick="addHelpers(500)">+500 Котов</button>
        <button class="btn" onclick="helpers = 0; updateUI(); saveData();">Убрать котов</button><br>
        <button class="btn" onclick="setSpecialRank('Котик!')">Ранг: Котик!</button>
        <button class="btn" onclick="forcedRank = 'Шерстяной'; updateUI(); saveData();">Ранг: Шерстяной</button><br>
        <button class="btn" onclick="forcedRank = ''; updateUI(); saveData();">Сброс Ранга</button><br>
        <button class="btn" onclick="closeCheat()" style="background:#666; margin-top:10px;">Закрыть терминал</button>
    </div>

    <script>
        // ТВОИ ДАННЫЕ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA3J2Xe_TptizbnYr7rSr_fQbuvtT1Vgs0",
            authDomain: "cybercrypt-online-de357.firebaseapp.com",
            projectId: "cybercrypt-online-de357",
            storageBucket: "cybercrypt-online-de357.appspot.com",
            databaseURL: "https://cybercrypt-online-de357-default-rtdb.firebaseio.com",
            messagingSenderId: "903069840701",
            appId: "1:903069840701:web:1c64e03b93addc1987c154"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = ""; let balance = 0; let helpers = 0; let forcedRank = "";

        function login() {
            user = document.getElementById('nick').value.trim();
            if(user.length < 2) return;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('disp-id').innerText = user;
            addLog("Владелец " + user + " подключен");
            
            db.ref('users/' + user).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    balance = data.balance || 0;
                    helpers = data.helpers || 0;
                    forcedRank = data.rank || "";
                    updateUI();
                } else { saveData(); }
            });
        }

        function doClick() {
            balance++; updateUI(); saveData(); addLog("+1 чашка кофе");
        }

        function buyCat(p, cost) {
            if(balance >= cost) {
                balance -= cost; helpers += p; addLog("Новый котик нанят! +" + p + "/сек"); updateUI(); saveData();
            } else { alert("Не хватает чашек! ☕️"); }
        }

        function updateUI() {
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-helpers').innerText = helpers;
            
            let r = "Котёнок";
            if(balance > 100) r = "Игривый кот";
            if(balance > 1000) r = "Кот-барон";
            if(balance > 10000) r = "Легенда";
            
            // Если ранг изменен через чит-меню, используем его
            document.getElementById('disp-rank').innerText = forcedRank || r;
        }

        function saveData() {
            if(!user) return;
            db.ref('users/' + user).update({
                balance: balance,
                helpers: helpers,
                rank: document.getElementById('disp-rank').innerText
            });
        }

        // Авто-доход
        setInterval(() => { if(helpers > 0) { balance += (helpers/10); updateUI(); } }, 100);

        function addLog(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function setTheme(t) {
            document.body.className = t;
            addLog("Тема изменена на " + t);
        }

        // ЧИТЫ (КОШАЧЬИ)
        function openCheat() { document.getElementById('cheat-menu').style.display = 'block'; }
        function closeCheat() { document.getElementById('cheat-menu').style.display = 'none'; }
        function addMoney(a) { balance += a; updateUI(); saveData(); addLog("ЧИТ: Баланс изменен"); }
        function addHelpers(a) { helpers += a; updateUI(); saveData(); addLog("ЧИТ: Добавлены котики"); }
        // Самый лучший ранг, который ты просил
        function setSpecialRank(r) { forcedRank = r; updateUI(); saveData(); addLog("ЧИТ: Ранг изменен на "+r); }
    </script>
</body>
</html>
